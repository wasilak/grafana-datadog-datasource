# This GitHub Action automates the process of building Grafana plugins.
# (For more information, see https://github.com/grafana/plugin-actions/blob/main/build-plugin/README.md)
name: Release

on:
  push:
    tags:
      - 'v*' # Run workflow on version tags, e.g. v1.0.0.
  # allow manual runs from Actions UI for diagnostics or ad-hoc releases
  workflow_dispatch: {}

permissions: read-all

jobs:
  release:
    permissions:
      contents: write
    # increase timeout to give builds more time while we diagnose CI instability
    timeout-minutes: 60
    env:
      ACTIONS_RUNNER_DEBUG: 'true'
      ACTIONS_STEP_DEBUG: 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Start CI resource monitor (background)
        run: |
          echo "Starting background CI monitor to /tmp/ci-monitor.log"
          nohup bash -c '\
            while true; do \
              date >> /tmp/ci-monitor.log; \
              echo "--- ps aux (top) ---" >> /tmp/ci-monitor.log; \
              ps aux --sort=-%cpu | head -20 >> /tmp/ci-monitor.log; \
              echo "--- vmstat 1 5 ---" >> /tmp/ci-monitor.log; \
              vmstat 1 5 >> /tmp/ci-monitor.log 2>&1; \
              echo "--- df -h ---" >> /tmp/ci-monitor.log; \
              df -h >> /tmp/ci-monitor.log; \
              sleep 10; \
            done' &

      - name: Install production dependencies and prune golang folders
        run: |
          echo "Installing production deps (yarn)"
          yarn --frozen-lockfile --production || yarn install --production --frozen-lockfile
          echo "Pruning any 'golang' directories inside node_modules to avoid go-manifest conflicts"
          find node_modules -type d -name golang -prune -print -exec rm -rf {} + || true
          echo "Check for remaining golang dirs (should be none):"
          find node_modules -type d -name golang || true

      - uses: grafana/plugin-actions/build-plugin@build-plugin/v1.2.0
        with:
          go-version: '1.25'
          node-version: '22'
        # Uncomment to enable plugin signing
        # (For more info on how to generate the access policy token see https://grafana.com/developers/plugin-tools/publish-a-plugin/sign-a-plugin#generate-an-access-policy-token)
        # policy_token: ${{ secrets.GRAFANA_ACCESS_POLICY_TOKEN }}
        # Usage of GRAFANA_API_KEY is deprecated, prefer `policy_token` option above
        # grafana_token: ${{ secrets.GRAFANA_API_KEY }}

      - name: Inspect built archives and workspace for golang files
        if: always()
        run: |
          echo "Checking workspace for any remaining 'golang' directories in node_modules"
          find . -path '*/node_modules/*/golang/*' -print || true
          echo "Checking for any .go files under node_modules"
          find . -type f -name '*.go' -path '*/node_modules/*' -print || true

          echo "Looking for produced zip archives and inspecting contents for node_modules golang or .go files"
          for z in $(find . -maxdepth 4 -name '*.zip' -print); do
            echo "Archive: $z"
            unzip -l "$z" | rg -E "node_modules/.*/golang|\\.go" || echo "no golang/.go entries in $z"
          done || true

      - name: Collect CI diagnostics (always)
        if: always()
        run: |
          echo "\n=== /tmp/ci-monitor.log tail ===\n"
          if [ -f /tmp/ci-monitor.log ]; then tail -n 200 /tmp/ci-monitor.log; else echo "no monitor log found"; fi
          echo "\n=== ps snapshot ===\n"
          ps aux --sort=-%cpu | head -50 || true
          echo "\n=== df -h ===\n"
          df -h || true
          echo "\n=== vmstat ===\n"
          vmstat 1 5 || true
