90:             echo "Searching for node_modules in manifest..."
91:             if rg -n "node_modules" dist/go_plugin_build_manifest; then
92:               echo "ERROR: go_plugin_build_manifest contains node_modules paths - this will cause validator failures"
93:               exit 1
94:             else
95:               echo "No node_modules entries found in go_plugin_build_manifest"
96:             fi
97:           else
98:             echo "No dist/go_plugin_build_manifest found - ok"
99:            fi
100:       - name: Package plugin
101:         id: package-plugin
102:         run: |
103:           sudo apt-get update && sudo apt-get install -y jq
104:           export GRAFANA_PLUGIN_ID=$(cat dist/plugin.json | jq -r .id)
105:           export GRAFANA_PLUGIN_VERSION=$(cat dist/plugin.json | jq -r .info.version)
106:           export GRAFANA_PLUGIN_ARTIFACT=${GRAFANA_PLUGIN_ID}-${GRAFANA_PLUGIN_VERSION}.zip
107:           export GRAFANA_PLUGIN_ARTIFACT_SHA1SUM=${GRAFANA_PLUGIN_ARTIFACT}.sha1
108:           echo "plugin-id=${GRAFANA_PLUGIN_ID}" >> $GITHUB_OUTPUT
109:           echo "plugin-version=${GRAFANA_PLUGIN_VERSION}" >> $GITHUB_OUTPUT
110:           echo "archive=${GRAFANA_PLUGIN_ARTIFACT}" >> $GITHUB_OUTPUT
111:           echo "archive-sha1sum=${GRAFANA_PLUGIN_ARTIFACT_SHA1SUM}" >> $GITHUB_OUTPUT
112:           mv dist "$GRAFANA_PLUGIN_ID"
113:           zip "$GRAFANA_PLUGIN_ARTIFACT" "$GRAFANA_PLUGIN_ID" -r
114:           sha1sum "$GRAFANA_PLUGIN_ARTIFACT" | cut -f1 -d' ' > "$GRAFANA_PLUGIN_ARTIFACT_SHA1SUM"
115:         shell: bash
116:       - name: Inspect built archives and workspace for golang files
117:         if: always()
118:         run: |
119:           echo "Checking workspace for any remaining 'golang' directories in node_modules"
120:           find . -path '*/node_modules/*/golang/*' -print || true
121:           echo "Checking for any .go files under node_modules"
122:           find . -type f -name '*.go' -path '*/node_modules/*' -print || true
123:           echo "Looking for produced zip archives and inspecting contents for node_modules golang or .go files"
124:           for z in $(find . -maxdepth 4 -name '*.zip' -print); do
125:             echo "Archive: $z"
126:             unzip -l "$z" | rg -E "node_modules/.*/golang|\.go" || echo "no golang/.go entries in $z"
127:           done || true
128:       - name: Collect CI diagnostics (always)
129:         if: always()
130:         run: |
131:           echo "\n=== /tmp/ci-monitor.log tail ===\n"
132:           if [ -f /tmp/ci-monitor.log ]; then tail -n 200 /tmp/ci-monitor.log; else echo "no monitor log found"; fi
133:           echo "\n=== ps snapshot ===\n"
134:           ps aux --sort=-%cpu | head -50 || true
135:           echo "\n=== df -h ===\n"
136:           df -h || true
137:           echo "\n=== vmstat ===\n"
138:           vmstat 1 5 || true
